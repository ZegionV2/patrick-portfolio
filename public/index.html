<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- ▼ Page title shown in browser tab and Google search results -->
    <title>Patrick Jason H. Turtor | Web Developer & Virtual Assistant</title>

    <!-- ▼ SEO meta tags — helps Google and employers find you -->
    <meta name="description" content="Portfolio of Patrick Jason H. Turtor — Junior Web Developer, Programmer, and Virtual Assistant based in the Philippines. Open to remote roles." />
    <meta name="keywords" content="Patrick Turtor, web developer, virtual assistant, flutter developer, react developer, Philippines, remote, junior developer, data entry" />
    <meta name="author" content="Patrick Jason H. Turtor" />
    <meta name="robots" content="index, follow" />

    <!-- ▼ Open Graph — controls how your link looks when shared on Facebook, LinkedIn, etc. -->
    <meta property="og:title" content="Patrick Jason H. Turtor | Web Developer & VA" />
    <meta property="og:description" content="Junior Web Developer and Programmer open to remote roles. Check out my projects and skills." />
    <meta property="og:type" content="website" />
    <!-- ▼ Replace YOUR_DEPLOYED_URL with your actual Vercel URL once deployed -->
    <meta property="og:url" content="https://YOUR_DEPLOYED_URL.vercel.app" />
    <!-- ▼ Optional: add a preview image at public/og-image.jpg (1200x630px recommended) -->
    <!-- <meta property="og:image" content="https://YOUR_DEPLOYED_URL.vercel.app/og-image.jpg" /> -->

    <!-- ▼ Twitter/X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Patrick Jason H. Turtor | Web Developer & VA" />
    <meta name="twitter:description" content="Junior Web Developer and Programmer open to remote roles." />

    <!-- ▼ Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- ▼ Favicon — save a small square image as public/favicon.ico or favicon.png -->
    <!-- <link rel="icon" type="image/png" href="/favicon.png" /> -->

    <!-- Theme color — colors the browser bar on mobile Chrome -->
    <meta name="theme-color" content="#0a0f1e" />
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
